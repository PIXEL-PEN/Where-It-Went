plugins {
    id 'com.android.application'
}

android {

    namespace 'com.pixelpen.whereitwent'
    compileSdk 36

    defaultConfig {
        applicationId "com.pixelpen.whereitwent"
        minSdk 24
        targetSdk 36
        versionCode 2
        versionName "2.0"
    }

    // ----------------------------------------------------
    // BUILD TYPES
    // ----------------------------------------------------
    buildTypes {

        debug {
            // Produces devDebug + stableDebug
            debuggable true
            // NO applicationIdSuffix here → suffix comes ONLY from flavor
        }

        release {
            // Produces stableRelease ONLY (because dev flavor is disabled for release)
            minifyEnabled false
            shrinkResources false

            // Don't suffix applicationId here → stableRelease must simply be .stable
            // (clean, simple, and avoids accidental devRelease)
        }
    }

    // ----------------------------------------------------
    // FLAVORS
    // ----------------------------------------------------
    flavorDimensions "mode"

    productFlavors {
        dev {
            dimension "mode"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name", "WhereIt-dev"
        }

        stable {
            dimension "mode"
            applicationIdSuffix ".stable"
            versionNameSuffix "-stable"
            resValue "string", "app_name", "Where It Went"
        }
    }


    // ----------------------------------------------------
    // CUSTOM APK NAMES
    // ----------------------------------------------------
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def flavor = variant.flavorName
            def build = variant.buildType.name
            def base = "WhereItWent"

            if (flavor == "dev") {
                outputFileName = "${base}-DEV-${build}.apk"     // devDebug only
            } else if (flavor == "stable") {
                outputFileName = "${base}-STABLE-${build}.apk"  // stableDebug + stableRelease
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.10.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'

    implementation 'androidx.room:room-runtime:2.6.0'
    annotationProcessor 'androidx.room:room-compiler:2.6.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
