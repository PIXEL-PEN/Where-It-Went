Name: Where It Went
Summary: Simple offline daily expense tracker
Description: |
  Where It Went is a clean, fast, offline-first daily expense tracker
  designed for real life. No cloud, no ads, no analytics. All data stays
  entirely on your device.

  Features:
    • Quick expense entry via dialog + FAB
    • Views: All, Date, Month, Category
    • Distribution graph (Fixed, Necessities, Discretionary, Off-Budget)
    • CSV and HTML export
    • Category Manager with tags
    • Fully offline, no tracking

  New in 2.0:
    • Major UI/UX overhaul
    • New dialog-based Add Expense flow
    • Scrollable Distribution screen
    • Polished typography, banners, and spacing
    • Dynamic About screen with version/variant/date

