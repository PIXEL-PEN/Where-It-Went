Name: Where It Went
Summary: Simple offline daily expense tracker
Description: |
  Where It Went is a clean, fast, offline-first daily expense tracker
  designed for real life. No cloud, no ads, no analytics.

  Features:
    • Quick expense entry
    • Views: All, Date, Month, Category
    • Distribution graph (Fixed, Necessities, Discretionary, Off-Budget)
    • CSV and HTML export
    • Side drawer navigation
    • Fully offline, no sign-up, no tracking

